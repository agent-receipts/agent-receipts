name: Publish Go Modules

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    if: startsWith(github.ref_name, 'sdk/go/v') || startsWith(github.ref_name, 'mcp-proxy/v')
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - module: sdk/go
            tag_prefix: sdk/go/v
            proxy_path: github.com/agent-receipts/ar/sdk/go
          - module: mcp-proxy
            tag_prefix: mcp-proxy/v
            proxy_path: github.com/agent-receipts/ar/mcp-proxy

    steps:
      - name: Check tag match
        id: guard
        run: |
          if [[ "${GITHUB_REF_NAME}" == "${{ matrix.tag_prefix }}"* ]]; then
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.match == 'true'

      - uses: actions/setup-go@v5
        if: steps.guard.outputs.match == 'true'
        with:
          go-version-file: ${{ matrix.module }}/go.mod

      - name: Reject local replace directives
        if: steps.guard.outputs.match == 'true'
        working-directory: ${{ matrix.module }}
        run: |
          go mod edit -json | python3 -c '
          import json, re, sys
          mod = json.load(sys.stdin)
          for entry in mod.get("Replace") or []:
              path = entry.get("New", {}).get("Path", "")
              if (path in (".", "..") or path.startswith("./") or path.startswith("../")
                  or path.startswith("/") or re.match(r"^[A-Za-z]:[\\\\/]", path)):
                  print(f"::error::go.mod contains a local replace directive ({path}) — remove it before releasing")
                  sys.exit(1)
          '

      - name: Vet
        if: steps.guard.outputs.match == 'true'
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Build
        if: steps.guard.outputs.match == 'true'
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: Test
        if: steps.guard.outputs.match == 'true'
        working-directory: ${{ matrix.module }}
        run: go test ./...

      - name: Request pkg.go.dev indexing
        if: steps.guard.outputs.match == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#${{ matrix.tag_prefix }}}"
          URL="https://proxy.golang.org/${{ matrix.proxy_path }}/@v/v${VERSION}.info"
          succeeded=false
          for attempt in 1 2 3; do
            if curl -fsS "$URL"; then
              succeeded=true
              break
            fi
            if [[ "$attempt" -lt 3 ]]; then
              sleep 2
            fi
          done
          if [[ "$succeeded" != "true" ]]; then
            echo "::warning::Failed to request pkg.go.dev indexing for ${{ matrix.proxy_path }}@v${VERSION} after 3 attempts"
          fi
